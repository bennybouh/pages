<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Focus Check</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: #0a0a0a;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  padding: 32px 24px;
  text-align: center;
}

/* ── POUR AJOUTER UN MESSAGE : ajoute une ligne dans le tableau MESSAGES ci-dessous ── */

.emoji {
  font-size: 52px;
  margin-bottom: 32px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}

.message {
  font-size: clamp(22px, 6vw, 34px);
  font-weight: 700;
  color: #ffffff;
  line-height: 1.4;
  letter-spacing: -0.3px;
  max-width: 500px;
  margin-bottom: 48px;
}

.sub {
  font-size: 15px;
  color: #444;
  margin-bottom: 40px;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.btn {
  background: #ffffff;
  color: #0a0a0a;
  border: none;
  border-radius: 50px;
  padding: 16px 48px;
  font-size: 17px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: -0.2px;
  transition: all 0.15s;
  -webkit-tap-highlight-color: transparent;
}

.btn:active {
  transform: scale(0.96);
  background: #e0e0e0;
}

.counter {
  margin-top: 32px;
  font-size: 12px;
  color: #222;
  letter-spacing: 0.1em;
}
</style>
</head>
<body>

<div class="emoji" id="emoji">🎯</div>
<div class="message" id="message"></div>
<div class="sub">Rappel · Focus Check</div>
<button class="btn" onclick="goBack()">J'ai compris ✓</button>
<div style="margin-top:16px">
  <button onclick="openAnyway()" style="background:none;border:1px solid #222;color:#444;border-radius:50px;padding:10px 24px;font-size:14px;cursor:pointer;font-family:inherit;transition:all .2s">
    Ouvrir quand même...
  </button>
</div>
<div class="counter" id="counter"></div>

<!-- Timer overlay -->
<div id="timer-overlay" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:#0a0a0a;flex-direction:column;align-items:center;justify-content:center;z-index:100">
  <div style="font-size:20px;color:#444;margin-bottom:12px;letter-spacing:.1em;text-transform:uppercase">Tu scrolles depuis</div>
  <div id="timer-display" style="font-size:80px;font-weight:700;color:#fff;letter-spacing:-3px;font-variant-numeric:tabular-nums">05:00</div>
  <div style="font-size:15px;color:#333;margin-top:16px;margin-bottom:40px">Est-ce que ça valait vraiment le coup ?</div>
  <button onclick="stopTimer()" style="background:#fff;border:none;border-radius:50px;padding:14px 40px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit">Arrêter</button>
  <a id="reminder-link" href="" style="margin-top:16px;font-size:13px;color:#333;text-decoration:none">📅 Créer un rappel "Stop scrolling"</a>
</div>

<script>
// ============================================================
// POUR AJOUTER UN MESSAGE :
// Ajoute une ligne dans le tableau ci-dessous entre les crochets
// Format : { e: "emoji", m: "ton message ici" },
// ============================================================

const MESSAGES = [
  { e: "🎯", m: "Pourquoi tu ouvres ça ? Qu'est-ce que tu voulais accomplir aujourd'hui ?" },
  { e: "⚡", m: "Les réseaux sociaux peuvent attendre. Tes objectifs, non." },
  { e: "🌱", m: "Dans 1 an tu seras content d'avoir résisté maintenant." },
  { e: "🧠", m: "Est-ce que ça t'aide à avancer ? Si non, ferme." },
  { e: "💪", m: "Tu codes à 42, tu investis, tu construis. Focus." },
  { e: "🔥", m: "Chaque minute sur Instagram est une minute de moins pour ce qui compte vraiment." },
  { e: "👀", m: "Tu scrolles ou tu construis ? Tu ne peux pas faire les deux en même temps." },
  { e: "🎮", m: "Même les jeux peuvent attendre. Finis d'abord ce que tu as commencé." },
  { e: "💰", m: "Les gens que tu admires ne passent pas leurs journées à scroller." },
  { e: "🚀", m: "La discipline aujourd'hui, c'est la liberté demain." },
  { e: "⏳", m: "Le temps que tu passes là, tu ne le récupères jamais." },
  { e: "🌙", m: "Tu mérites mieux que de nourrir l'algorithme d'Instagram." },
];

// Choisit un message aléatoire
const idx = Math.floor(Math.random() * MESSAGES.length);
const item = MESSAGES[idx];

document.getElementById("emoji").textContent = item.e;
document.getElementById("message").textContent = item.m;
document.getElementById("counter").textContent = `Message ${idx + 1} / ${MESSAGES.length}`;

let timerInterval = null;
let seconds = 900; // 5 minutes

function goBack() {
  document.body.style.opacity = "0";
  document.body.style.transition = "opacity 0.3s";
  setTimeout(() => {
    document.body.innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0a0a0a">
        <div style="text-align:center">
          <div style="font-size:48px;margin-bottom:16px">✅</div>
          <div style="color:#fff;font-size:18px;font-weight:600">Bien joué !</div>
          <div style="color:#444;font-size:14px;margin-top:8px">Focus maintenu 💪</div>
        </div>
      </div>`;
    document.body.style.opacity = "1";
  }, 300);
}

function openAnyway() {
  seconds = 900;
  const overlay = document.getElementById("timer-overlay");
  overlay.style.display = "flex";

  // Reminder link via x-callback (works with Reminders app on iOS)
  const reminderText = encodeURIComponent("⛔ Stop scrolling ! Reviens à ce que tu faisais.");
  document.getElementById("reminder-link").href =
    `x-apple-reminderkit://REMCDReminder/?title=${reminderText}`;

  // Start countdown
  updateDisplay();
  timerInterval = setInterval(() => {
    seconds--;
    updateDisplay();
    if (seconds <= 0) {
      clearInterval(timerInterval);
      document.getElementById("timer-display").textContent = "00:00";
      document.getElementById("timer-display").style.color = "#ef4444";
    }
  }, 1000);
}

function stopTimer() {
  if (timerInterval) clearInterval(timerInterval);
  const overlay = document.getElementById("timer-overlay");
  overlay.style.display = "none";
  seconds = 300;
}

function updateDisplay() {
  const m = Math.floor(seconds / 60).toString().padStart(2, "0");
  const s = (seconds % 60).toString().padStart(2, "0");
  document.getElementById("timer-display").textContent = `${m}:${s}`;
  // Color shift as time passes
  const pct = seconds / 300;
  if (pct > 0.6) document.getElementById("timer-display").style.color = "#fff";
  else if (pct > 0.3) document.getElementById("timer-display").style.color = "#f59e0b";
  else document.getElementById("timer-display").style.color = "#ef4444";
}
</script>
</body>
</html>
